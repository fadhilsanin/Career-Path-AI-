<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .password-container {
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      width: 380px;
      padding: 30px 40px;
      text-align: center;
    }

    h2 {
      margin-bottom: 25px;
      color: #333;
      letter-spacing: 1px;
    }

    label {
      display: block;
      text-align: left;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s ease-in-out;
    }

    input[type="password"]:focus {
      border-color: #5563DE;
      box-shadow: 0 0 5px rgba(85, 99, 222, 0.5);
    }

    button {
      background-color: #5563DE;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s ease;
      width: 100%;
    }

    button:hover {
      background-color: #4150C8;
    }

    .footer {
      margin-top: 15px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="password-container">
    <h2>Change Password</h2>
    <form method="post" action="/myapp/change_password_post/">
      {% csrf_token %}
      <label>Current Password</label>
      <input type="password" name="current_password" required>

      <label>New Password</label>
      <input type="password" name="new_password" required>

      <label>Confirm Password</label>
      <input type="password" name="confirm_password" required>

      <button type="submit">Update Password</button>
    </form>
    <div class="footer">
      <p>Ensure your new password is strong and unique.</p>
    </div>
  </div>

</body>
</html>
