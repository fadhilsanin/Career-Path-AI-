{% extends 'guide/index.html' %}
{% block body %}
<head>
    <meta charset="UTF-8">
    <title>Applicant List</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        table {
            width: 90%;
            margin: 0 auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #4f46e5;
            color: white;
            padding: 14px;
            text-align: left;
            font-size: 16px;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f3f4f6;
        }

        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        a.button {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            text-align: center;
            transition: background-color 0.2s;
        }

        a.accept {
            background-color: #16a34a;
            color: white;
        }

        a.accept:hover {
            background-color: #15803d;
        }

        a.reject {
            background-color: #dc2626;
            color: white;
        }

        a.reject:hover {
            background-color: #b91c1c;
        }
    </style>
</head>
<body>

<h2>Applicant Details</h2>

<table>
<form method="POST" action="/myapp/guide_user_request">
    <thead>
        <tr>
            <th>User</th>
            <th>Request</th>
            <th>Date</th>
            <th>Actions</th>

        </tr>
    </thead>
    <tbody>
                {% for i in data %}

        <tr>
            <td>{{i.USER.name}}</td>
            <td>{{i.request}}</td>
            <td>{{i.date}}</td>

                    <td>
                    {% if i.status == 'pending' %}
                    <a href="/myapp/Acceptuser/{{ i.id }}/" class="btn btn-success btn-sm">Accept</a>
                            <a href="/myapp/Rejectuser/{{ i.id }}/" class="btn btn-danger btn-sm">Reject</a>
                    {% else %} {{ i.status }} {% endif %}

                    </td>
                {% endfor %}

    </tbody>
</form>
</table>

</body>
{% endblock %}
