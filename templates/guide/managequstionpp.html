{% extends 'guide/index.html' %}
{% block body %}
<head>
    <meta charset="UTF-8">
    <title>Exam Management</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        table {
            width: 90%;
            margin: 0 auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #4f46e5;
            color: white;
            padding: 14px;
            text-align: left;
            font-size: 16px;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: middle;
        }

        tr:hover {
            background-color: #f3f4f6;
        }

        a {
            text-decoration: none;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background-color 0.2s, color 0.2s;
        }

        a.edit {
            background-color: #2563eb;
            color: white;
        }

        a.edit:hover {
            background-color: #1d4ed8;
        }

        a.delete {
            background-color: #dc2626;
            color: white;
        }

        a.delete:hover {
            background-color: #b91c1c;
        }

        .add-btn {
            display: inline-block;
            background-color: #4f46e5;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 500;
            text-decoration: none;
            margin: 25px auto;
            display: block;
            width: fit-content;
        }

        .add-btn:hover {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

<h2>Exam Details</h2>

<table>
    <thead>
        <tr>
            <th>Exam</th>
            <th>Question Paper</th>
            <th>Answer</th>
            <th>Year</th>
            <th colspan="2" style="text-align:center;">Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for i in val %}
            <tr>
            <td>{{ i.EXAM.exam_name }}</td>
                <td><a href="/media/{{ i.qustionpaper }}">View Question</a></td>
                <td><a href="/media/{{ i.answersheet}}">View Answer</a> </td>
                <td>{{ i.year }}</td>
{#                <td><a href="#">Edit</a></td>#}
                <td><a href="/myapp/delete_questionpp/{{ i.id }}">Delete</a></td>
            </tr>
        {% endfor %}

    </tbody>
</table>

<a href="/myapp/guide_add_questionpp" class="add-btn">+ Add New Exam</a>

</body>
{% endblock %}
