{% extends 'company/companyhome.html' %}
{% block body %}
<head>
  <meta charset="UTF-8">
  <title>Add Job Vacancy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Poppins', sans-serif;
    }
    .form-card {
      max-width: 600px;
      margin-left:40%;
      background: #fff;
      padding: 30px 50px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);

    }
    .form-card h3 {
      text-align: center;
      margin-bottom: 30px;
      color: #0d6efd;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      font-weight: 500;
      color: #333;
    }
    input.form-control {
      border-radius: 10px;
      padding: 10px;
    }
    button {
      width: 100%;
      background-color: #0d6efd;
      border: none;
      color: white;
      font-weight: 500;
      padding: 12px;
      border-radius: 10px;
      transition: 0.3s;
    }
    button:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>

<body>

  <div class="form-card">
    <h3>Add Job Vacancy</h3>
    <form method="POST" action="/myapp/add_vaccancy_post">
      {% csrf_token %}
      <div class="form-group">
        <label for="vacancy">Vacancy</label>
        <input type="text" id="vacancy" name="vacancy" class="form-control" placeholder="Enter job title" required>
      </div>

      <div class="form-group">
        <label for="details">Details</label>
        <input type="text" id="details" name="details" class="form-control" placeholder="Enter job details" required>
      </div>

      <div class="form-group">
        <label for="salary">Salary</label>
        <input type="text" id="salary" name="salary" class="form-control" placeholder="Enter salary range" required>
      </div>

      <div class="form-group">
        <label for="experience">Experience</label>
        <input type="text" id="experience" name="experience" class="form-control" placeholder="Enter required experience" required>
      </div>

      <div class="form-group">
        <label for="qualification">Qualification</label>
        <input type="text" id="qualification" name="qualification" class="form-control" placeholder="Enter qualification" required>
      </div>

      <div class="form-group">
        <label for="requirements">Requirements</label>
        <input type="text" id="requirements" name="requirements" class="form-control" placeholder="Enter job requirements" required>
      </div>
        <div class="form-group">
        <label for="num_vacancies">End date</label>
        <input type="date" id="date" name="date" class="form-control" placeholder="Enter the date" required>
      </div>

      <div class="form-group">
        <label for="num_vacancies">No of Vacancies</label>
        <input type="number" id="num_vacancies" name="no_of_vaccancy" class="form-control" placeholder="Enter number of openings" required>
      </div>


      <button type="submit">Save Vacancy</button>
    </form>
  </div>
</body>
{% endblock %}
