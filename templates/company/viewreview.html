{% extends 'company/companyhome.html' %}
{% block body %}
<head>
  <meta charset="UTF-8">
  <title>Company Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Poppins', sans-serif;
    }

    .table-card {
      max-width: 900px;
      margin: 70px auto;
      background: #fff;
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .table-card h3 {
      text-align: center;
      color: #0d6efd;
      font-weight: 600;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background-color: #0d6efd;
      color: #fff;
      text-align: center;
      padding: 12px;
      font-weight: 500;
      border-top-left-radius: 10px;
      border-top-right-radius: 10px;
    }

    td {
      text-align: center;
      padding: 14px;
      color: #333;
      border-bottom: 1px solid #dee2e6;
      vertical-align: middle;
    }

    tr:hover {
      background-color: #f1f5ff;
      transition: background-color 0.2s;
    }

    .rating {
      color: #f8c102;
      font-size: 1.2em;
    }

    @media (max-width: 768px) {
      .table-card {
        padding: 25px;
      }
      table {
        font-size: 14px;
      }
      th, td {
        padding: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="table-card">
    <h3>Company Feedback</h3>
    <form>
      <div class="table-responsive">
        <table class="table align-middle" table border="1">
          <thead>
            <tr>
              <th>Name</th>
              <th>Feedback</th>
              <th>Rating</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>

    {% for item in data %}
    <tr>
        <td>{{ item.USER.name }}</td>
        <td>{{ item.review }}</td>
        <td>{{ item.rating }}</td>
        <td>{{ item.date }}</td>
    </tr>
    {% endfor %}
</table>


          </tbody>
        </table>
      </div>
    </form>
  </div>
</body>
{% endblock %}
