<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login & Signup</title>

<style>
@import url('https://fonts.googleapis.com/css?family=Poppins:400,500,600,700&display=swap');

*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}
html,body{
  display: grid;
  height: 100%;
  width: 100%;
  place-items: center;
  background: -webkit-linear-gradient(left, #003366,#004080,#0059b3,#0073e6);
}
::selection{
  background: #1a75ff;
  color: #fff;
}
.wrapper{
  overflow: hidden;
  max-width: 390px;
  background: #fff;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0px 15px 20px rgba(0,0,0,0.1);
}
.wrapper .title-text{
  display: flex;
  width: 200%;
}
.wrapper .title{
  width: 50%;
  font-size: 35px;
  font-weight: 600;
  text-align: center;
  transition: all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.wrapper .slide-controls{
  position: relative;
  display: flex;
  height: 50px;
  width: 100%;
  overflow: hidden;
  margin: 30px 0 10px 0;
  justify-content: space-between;
  border: 1px solid lightgrey;
  border-radius: 15px;
}
.slide-controls .slide{
  height: 100%;
  width: 100%;
  color: #fff;
  font-size: 18px;
  font-weight: 500;
  text-align: center;
  line-height: 48px;
  cursor: pointer;
  z-index: 1;
  transition: all 0.6s ease;
}
.slide-controls label.signup{
  color: #000;
}
.slide-controls .slider-tab{
  position: absolute;
  height: 100%;
  width: 50%;
  left: 0;
  z-index: 0;
  border-radius: 15px;
  background: -webkit-linear-gradient(left,#003366,#004080,#0059b3,#0073e6);
  transition: all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
}
input[type="radio"]{
  display: none;
}
#signup:checked ~ .slider-tab{
  left: 50%;
}

.wrapper .form-container{
  width: 100%;
  overflow: hidden;
}
.form-container .form-inner{
  display: flex;
  width: 200%;
}
.form-container .form-inner form{
  width: 50%;
  transition: all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.form-inner form .field{
  height: 50px;
  width: 100%;
  margin-top: 20px;
}
.form-inner form .field input{
  height: 100%;
  width: 100%;
  outline: none;
  padding-left: 15px;
  padding-right: 45px;
  border-radius: 15px;
  border: 1px solid lightgrey;
  border-bottom-width: 2px;
  font-size: 17px;
}
.form-inner form .field input:focus{
  border-color: #1a75ff;
}

.password-field{
  position: relative;
}
.toggle-password{
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  color: #666;
}
.toggle-password:hover{
  color: #1a75ff;
}

form .btn{
  height: 50px;
  width: 100%;
  border-radius: 15px;
  position: relative;
  overflow: hidden;
}
form .btn .btn-layer{
  height: 100%;
  width: 300%;
  position: absolute;
  left: -100%;
  background: -webkit-linear-gradient(right,#003366,#004080,#0059b3,#0073e6);
  border-radius: 15px;
  transition: all 0.4s ease;
}
form .btn:hover .btn-layer{
  left: 0;
}
form .btn input[type="submit"]{
  height: 100%;
  width: 100%;
  position: relative;
  background: none;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
}

/* Forgot Password */
.forgot-password{
  margin-top: 15px;
  text-align: center;
}
.forgot-password a{
  color: #1a75ff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}
.forgot-password a:hover{
  text-decoration: underline;
}

/* Signup buttons */
.btn-link{
  display: inline-block;
  padding: 12px;
  background: #007bff;
  color: white;
  border-radius: 10px;
  text-align: center;
  text-decoration: none;
}
.btn-link:hover{
  background: #0056b3;

}
</style>
</head>

<body>

<div class="wrapper">
  <div class="title-text">
    <div class="title login">Login Form</div>
    <div class="title signup">Signup Form</div>
  </div>

  <div class="form-container">
    <div class="slide-controls">
      <input type="radio" name="slide" id="login" checked>
      <input type="radio" name="slide" id="signup">
      <label for="login" class="slide login">Login</label>
      <label for="signup" class="slide signup">Registration</label>
      <div class="slider-tab"></div>
    </div>

    <div class="form-inner">

      <!-- LOGIN FORM -->
      <form action="/myapp/login_get/" method="post" class="login">
        {% csrf_token %}

        <div class="field">
          <input type="text" placeholder="Username" name="username" required>
        </div>

        <div class="field password-field">
          <input type="password" placeholder="Password" name="password" id="password" required>
          <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>

        <div class="field btn">
          <div class="btn-layer"></div>
          <input type="submit" value="Login">
        </div>

{#        <div class="forgot-password">#}
{#          <a href="/myapp/forget_passwordweb/">Forgot Password?</a>#}
{#        </div>#}
      </form>

      <!-- SIGNUP FORM -->
      <form class="signup">
        <div class="field">
          <a href="/myapp/company_company_registraion/" class="btn-link">Company Register</a>
        </div>
        <div class="field">
          <a href="/myapp/guide_guide_register/" class="btn-link">Guide Register</a>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
const loginText = document.querySelector(".title-text .login");
const loginForm = document.querySelector("form.login");
const loginBtn = document.querySelector("label.login");
const signupBtn = document.querySelector("label.signup");

signupBtn.onclick = () => {
  loginForm.style.marginLeft = "-50%";
  loginText.style.marginLeft = "-50%";
};

loginBtn.onclick = () => {
  loginForm.style.marginLeft = "0%";
  loginText.style.marginLeft = "0%";
};

{#function togglePassword(){#}
{#  const password = document.getElementById("password");#}
{#  password.type = password.type === "password" ? "text" : "password";#}
{#}#}
</script>

</body>
</html>
