{% extends 'admin/admin_home.html' %}
{% block body %}
<head>
  <meta charset="UTF-8">
  <title>Admin – Add Details</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg rounded-4 border-0">
          <div class="card-header bg-primary text-white text-center rounded-top-4">
            <h4>Add New Record</h4>
          </div>
          <div class="card-body">
            <form action="/myapp/add_exam_post/" method="post">
              {% csrf_token %}
              <div class="mb-3">
                <label for="name" class="form-label fw-semibold">Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter name" required>
              </div>
              <div class="mb-3">
                <label for="details" class="form-label fw-semibold">Details</label>
                <input type="text" id="details" name="details" class="form-control" placeholder="Enter details" required>
              </div>
              <div class="mb-3">
                <label for="date" class="form-label fw-semibold">Last Date</label>
                <input type="date" id="date" name="date" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="link" class="form-label fw-semibold">Link</label>
                <input type="url" id="link" name="link" class="form-control" placeholder="Enter URL">
              </div>
              <div class="text-center">
                <button type="submit" class="btn btn-success px-4">Save</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
{% endblock %}
