<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Forgot Password?</h1>
            <p class="text-sm text-gray-600">Enter your email to receive a recovery link.</p>
        </div>

        <!-- Toast Messages Container -->
        <div class="fixed top-8 right-8 z-50 space-y-3 w-80">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert-toast bg-white border-l-4 p-4 shadow-2xl flex items-start space-x-3
                        {% if message.tags == 'error' %} border-red-600
                        {% elif message.tags == 'warning' %} border-amber-500
                        {% else %} border-blue-800 {% endif %} fade-in">
                        <div class="flex-1">
                            <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">
                                {% if message.tags == 'error' %}Error{% else %}Security Alert{% endif %}
                            </p>
                            <p class="text-xs font-bold text-slate-700 leading-tight">{{ message }}</p>
                        </div>
                        <button onclick="this.parentElement.classList.add('fade-out')" class="text-slate-300 hover:text-slate-900 text-xl font-bold leading-none">×</button>
                    </div>
                {% endfor %}
            {% endif %}
        </div>

        <!-- Recovery Form -->
        <form id="recoveryForm" class="space-y-4" method="post" action="{% url 'password_reset' %}">
            {% csrf_token %}
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                       placeholder="your@email.com">
            </div>
            <button id="submitBtn" type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center space-x-2">
                <span>Send Recovery Link</span>
                <svg class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="text-center">
            <a href="{% url 'login' %}" class="text-sm text-blue-600 hover:text-blue-800 font-medium">Back to Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('recoveryForm');
        const btn = document.getElementById('submitBtn');
        const spinner = btn.querySelector('svg');

        form.addEventListener('submit', function(e) {
            // Client-side validation
            const email = document.getElementById('email').value;
            if (!email || !email.includes('@')) {
                e.preventDefault();
                // You can add a toast here dynamically if needed
                alert('Please enter a valid email address.');
                return;
            }

            // Add loading state
            btn.classList.add('loading');
            btn.disabled = true;
            spinner.classList.remove('hidden');
        });

        // Auto-remove toasts after animation
        document.addEventListener('animationend', (e) => {
            if (e.animationName === 'fadeOut') {
                e.target.remove();
            }
        });

        // Fade in toasts on load
        document.querySelectorAll('.alert-toast').forEach(toast => {
            toast.classList.add('fade-in');
        });
    </script>
</body>
</html>
